<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSENA IOT</title>
<link rel="icon" href="assets/image1.png" type="image/png" />
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#317EFB">
<script type="module" src="app.js"></script>
</head>
<body>

<h1>⚙️ Motor Control Panel</h1>

<!-- LOGIN FORM -->
<div id="loginDiv">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <p id="loginError" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <div class="motor-wrapper">
        <div class="card off" id="motorCard">
            <img src="assets/motor.png" alt="Motor">
            <button id="motorBtn">OFF</button>
        </div>

        <div class="values-card">
            <div>R <span id="rPhase">0 V</span></div>
            <div>Y <span id="yPhase">0 V</span></div>
            <div>B <span id="bPhase">0 V</span></div>
            <div>R <span id="rCurrent">0 A</span></div>
            <div>Y <span id="yCurrent">0 A</span></div>
            <div>B <span id="bCurrent">0 A</span></div>
            <div>Pressure <span id="pressure">0</span></div>
            <div>EB <span id="ebStatus">0</span></div>
            <div>Status <span id="status">OFF</span></div>
        </div>
    </div>

    <h2>Valves</h2>
    <div class="container" id="valveContainer"></div>
    <br>
    <button onclick="logout()">Logout</button>
</div>

</body>

</html>
